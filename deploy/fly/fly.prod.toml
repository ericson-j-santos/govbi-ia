# Fly.io — govbi-ia-prod (produção)
# Uso: fly deploy -c deploy/fly/fly.prod.toml --app govbi-ia-prod
# ATENÇÃO: promoção para produção exige readiness aprovado e janela de rollout.

app = "govbi-ia-prod"
primary_region = "gru"

[build]
  dockerfile = "deploy/docker/Dockerfile"

[env]
  SPRING_PROFILES_ACTIVE = "prod"
  GOVBI_VERSAO = "1.0.1"
  GOVBI_AMBIENTE = "prod"
  GOVBI_RELEASE_MODO = "producao"
  GOVBI_IA_MODO = "gemini"
  GOVBI_GEMINI_MODEL = "gemini-2.0-flash"
  GOVBI_DADOS_EXECUTOR = "mock-rag"
  GOVBI_DADOS_PERMITIR_EXECUCAO_REAL = "false"
  GOVBI_OIDC_HABILITADO = "false"
  GOVBI_WORKER_HABILITADO = "false"
  GOVBI_FILA_HABILITADA = "false"
  GOVBI_NOTIFICACAO_CANAIS_ATIVOS = "LOG"
  GOVBI_DOWNLOAD_HABILITADO = "true"
  GOVBI_DOWNLOAD_EXIGIR_AUDITORIA = "true"
  GOVBI_SLA_EXPIRAR_APROVACOES_HABILITADO = "false"
  GOVBI_OBSERVABILIDADE_METRICAS_HABILITADAS = "true"
  GOVBI_CATALOGO_TIPO = "yaml"
  GOVBI_CATALOGO_RECURSO = "classpath:catalogo-semantico-reqsys.yml"
  GOVBI_COFRE_HABILITADO = "true"
  GOVBI_COFRE_URL = "https://reqsys-enterprise-api.fly.dev"

# Secrets obrigatórios via: fly secrets set -a govbi-ia-prod
# GOVBI_GEMINI_API_KEY  — chave do Google AI Studio
# GOVBI_COFRE_TOKEN     — token de acesso ao reqsys-enterprise-api

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[services.http_checks]]
    interval = "20s"
    timeout = "10s"
    grace_period = "60s"
    method = "GET"
    path = "/actuator/health"

[vm]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[deploy]
  strategy = "rolling"
