services:
  govbi-ia:
    image: govbi-ia:1.0.1
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    env_file:
      - ../env/.env.local
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
