apiVersion: apps/v1
kind: Deployment
metadata:
  name: govbi-ia
spec:
  replicas: 2
  selector:
    matchLabels:
      app: govbi-ia
  template:
    metadata:
      labels:
        app: govbi-ia
    spec:
      containers:
        - name: govbi-ia
          image: govbi-ia:0.6.0
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: govbi-ia-config
            - secretRef:
                name: govbi-ia-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
