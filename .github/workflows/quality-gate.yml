name: GovBI IA Quality Gate

on:
  pull_request:
  push:
    branches: [ master, main, develop ]

permissions:
  contents: read

concurrency:
  group: govbi-quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Backend unit tests
        run: |
          cd backend
          mvn --batch-mode --no-transfer-progress test
      - name: Frontend build
        working-directory: frontend-angular
        run: |
          npm install --no-audit --no-fund
          npm run build
      - name: Static quality checks
        run: |
          python scripts/quality_check.py
          python scripts/validate_catalog_version.py
          python scripts/evaluate_nl_sql.py --offline
          python scripts/validate_operational_increment.py
          python scripts/validate_persistence_increment.py
          python scripts/validate_async_increment.py
          python scripts/validate_integration_increment.py
          python scripts/validate_release_v100.py
          python scripts/e2e_contract_v100.py --offline
          python scripts/validate_homologation_v101.py
          python scripts/run_homologation_smoke.py --modo offline
          python scripts/generate_aceite_report.py --ambiente ci
