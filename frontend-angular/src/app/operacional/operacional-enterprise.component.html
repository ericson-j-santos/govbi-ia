<section class="enterprise-shell">
  <mat-card>
    <mat-card-title>Operação enterprise GovBI IA</mat-card-title>
    <mat-card-subtitle>Aprovações, fila assíncrona, resultados, notificações e SLA.</mat-card-subtitle>
    <table mat-table [dataSource]="itens" class="enterprise-table">
      <ng-container matColumnDef="tipo"><th mat-header-cell *matHeaderCellDef>Tipo</th><td mat-cell *matCellDef="let row">{{ row.tipo }}</td></ng-container>
      <ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th><td mat-cell *matCellDef="let row">{{ row.status }}</td></ng-container>
      <ng-container matColumnDef="sla"><th mat-header-cell *matHeaderCellDef>SLA / retenção</th><td mat-cell *matCellDef="let row">{{ row.sla }}</td></ng-container>
      <ng-container matColumnDef="acao"><th mat-header-cell *matHeaderCellDef>Ação</th><td mat-cell *matCellDef="let row"><button mat-stroked-button>Detalhar</button></td></ng-container>
      <tr mat-header-row *matHeaderRowDef="colunas"></tr>
      <tr mat-row *matRowDef="let row; columns: colunas"></tr>
    </table>
  </mat-card>
</section>
